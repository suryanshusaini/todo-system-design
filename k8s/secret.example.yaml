# ──────────────────────────────────────────────────────────────
# k8s/secret.example.yaml  — DO NOT COMMIT k8s/secret.yaml
# ──────────────────────────────────────────────────────────────
# 1. Copy this file:  cp k8s/secret.example.yaml k8s/secret.yaml
# 2. Base64-encode each value:
#      echo -n 'your_value' | base64
# 3. Replace every REPLACE_WITH_BASE64_... placeholder below.
# 4. Apply:  kubectl apply -f k8s/secret.yaml
# ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: todo-saas-secrets
  namespace: todo-saas
type: Opaque
data:
  # Auth service
  AUTH_JWT_SECRET:          REPLACE_WITH_BASE64_JWT_SECRET
  GOOGLE_CLIENT_ID:         REPLACE_WITH_BASE64_GOOGLE_CLIENT_ID
  GOOGLE_CLIENT_SECRET:     REPLACE_WITH_BASE64_GOOGLE_CLIENT_SECRET
  GOOGLE_CALLBACK_URL:      REPLACE_WITH_BASE64_GOOGLE_CALLBACK_URL

  # Razorpay
  RAZORPAY_KEY_ID:          REPLACE_WITH_BASE64_RZP_KEY_ID
  RAZORPAY_KEY_SECRET:      REPLACE_WITH_BASE64_RZP_KEY_SECRET
  RAZORPAY_WEBHOOK_SECRET:  REPLACE_WITH_BASE64_RZP_WEBHOOK_SECRET

  # Todo service  (share the same JWT secret as auth)
  TODO_JWT_SECRET:          REPLACE_WITH_BASE64_JWT_SECRET
