# ── Auth Service Deployment + ClusterIP Service ────────
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: todo-saas
  labels:
    app: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - port: 4001
      targetPort: 4001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: todo-saas
spec:
  selector:
    matchLabels:
      app: auth-service
  replicas: 1
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: todo-saas/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4001
          env:
            # Non-secret config
            - name: AUTH_PORT
              value: "4001"
            - name: AUTH_JWT_ISSUER
              value: "todo-saas"
            - name: AUTH_JWT_AUDIENCE
              value: "todo-saas-web"
            - name: AUTH_COOKIE_NAME
              value: "todo_saas_token"
            - name: AUTH_CORS_ORIGIN
              value: "http://localhost"       # Update to your domain
            - name: MONGO_URI
              value: "mongodb://mongo:27017/todo-saas"
            # Secrets from k8s/secret.yaml
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: todo-saas-secrets
                  key: AUTH_JWT_SECRET
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: todo-saas-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: todo-saas-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: GOOGLE_CALLBACK_URL
              valueFrom:
                secretKeyRef:
                  name: todo-saas-secrets
                  key: GOOGLE_CALLBACK_URL
            - name: RAZORPAY_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: todo-saas-secrets
                  key: RAZORPAY_KEY_ID
            - name: RAZORPAY_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: todo-saas-secrets
                  key: RAZORPAY_KEY_SECRET
            - name: RAZORPAY_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: todo-saas-secrets
                  key: RAZORPAY_WEBHOOK_SECRET
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 8
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "300m"
